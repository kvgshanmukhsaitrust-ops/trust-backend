# =========================================
# PRODUCTION PROFILE OVERRIDES
# Activated via: -Dspring.profiles.active=prod
# Inherits all settings from application.properties
# =========================================

# =========================================
# JPA / HIBERNATE (Production)
# =========================================
# 'update' creates missing tables on first deploy and safely adds new
# columns/tables on subsequent deploys without dropping existing data.
# Switch to 'validate' only after the schema is fully stable and managed
# by a dedicated migration tool (e.g. Flyway).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# =========================================
# SECURITY (Production)
# =========================================
# Enforce secure (HTTPS-only) cookies in production
app.cookie.secure=true

# =========================================
# LOGGING (Production)
# =========================================
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql=warn
logging.level.com.trustplatform=info
logging.level.org.springframework.security=warn
