# =========================================
# APPLICATION
# =========================================
spring.application.name=trust-platform-backend
server.port=8080

# =========================================
# DATABASE CONFIGURATION (MySQL)
# =========================================
spring.datasource.url=jdbc:mysql://localhost:3306/ngo_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:Rohith@358}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================
# JPA / HIBERNATE
# CRITICAL FIX: changed from "create" to "validate"
# "create" was wiping the entire database on every restart.
# "validate" checks the schema matches without touching data.
# =========================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=never
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql=warn
logging.level.com.trustplatform=info

# =========================================
# JWT CONFIGURATION
# FIX 1: Secret externalized to env variable
# FIX 2: Expiry reduced from 24h to 15min
#        (stolen tokens now expire in 15 min, not 24 hours)
# =========================================
app.jwt.secret=${JWT_SECRET:your_super_secret_key_that_is_at_least_32_characters_long_for_hs256}
app.jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:2592000000}
app.verification.expiration=${VERIFICATION_EXPIRATION:86400000}

# =========================================
# RATE LIMITING
# 10 auth requests per 60 seconds per IP
# =========================================
rate-limit.auth.capacity=10
rate-limit.auth.refill-tokens=10
rate-limit.auth.refill-seconds=60

# =========================================
# COOKIE
# Set to false for local dev (HTTP)
# Set to true in production (HTTPS only)
# =========================================
app.cookie.secure=false

# =========================================
# SECURITY
# =========================================
spring.security.user.name=disabled
spring.security.user.password=disabled

# =========================================
# FILE UPLOAD
# =========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =========================================
# ACTUATOR
# =========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# =========================================
# EMAIL CONFIGURATION
# =========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=kvgshanmukhsaitrust@gmail.com
spring.mail.password=${MAIL_PASSWORD:vtvvgrzvihdtxseh}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# =========================================
# RAZORPAY
# =========================================
razorpay.key-id=${RAZORPAY_KEY_ID:dummy_key}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:dummy_secret}