# =========================================
# APPLICATION
# =========================================
spring.application.name=trust-platform-backend
server.port=${PORT:8080}

# =========================================
# DATABASE CONFIGURATION (MySQL)
# =========================================
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
app.frontend.url=${FRONTEND_URL:*}

# =========================================
# JPA / HIBERNATE
# =========================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=never
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql=warn
logging.level.com.trustplatform=info

# =========================================
# JWT CONFIGURATION
# =========================================
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:2592000000}
app.verification.expiration=${VERIFICATION_EXPIRATION:86400000}

# =========================================
# RATE LIMITING
# =========================================
rate-limit.auth.capacity=10
rate-limit.auth.refill-tokens=10
rate-limit.auth.refill-seconds=60

# =========================================
# COOKIE
# =========================================
app.cookie.secure=false

# =========================================
# SECURITY
# =========================================
spring.security.user.name=disabled
spring.security.user.password=disabled

# =========================================
# FILE UPLOAD
# =========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =========================================
# ACTUATOR
# =========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# =========================================
# EMAIL CONFIGURATION
# =========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=kvgshanmukhsaitrust@gmail.com
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# =========================================
# RAZORPAY
# =========================================
razorpay.key-id=${RAZORPAY_KEY_ID:}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:}

# =========================================
# PDF RECEIPT ARCHIVAL
# =========================================
app.receipts.storage-path=${APP_RECEIPTS_STORAGE_PATH:./receipts}